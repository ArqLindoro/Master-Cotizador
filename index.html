<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consultoría Técnica | Arq. David Lindoro Juárez</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --dark: #1a1a1a; --gold: #c5a059; --accent: #27ae60; }
        body { font-family: 'Helvetica', sans-serif; background: #f4f4f4; padding: 20px; margin: 0; }
        .header-fixed { background: var(--dark); color: white; padding: 20px; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .summary-box { text-align: right; }
        .summary-box span { font-size: 24px; color: var(--gold); font-weight: bold; }
        .container { padding: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        input[type="file"] { background: white; padding: 10px; border: 1px solid #ddd; }
        button { padding: 10px 15px; cursor: pointer; border: none; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-pdf { background: var(--gold); color: white; }
        .btn-excel { background: var(--accent); color: white; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th { background: #333; color: white; padding: 12px; text-align: left; position: sticky; top: 85px; z-index: 90; }
        td { border: 1px solid #eee; padding: 8px; }
        .row-semana { background: #333 !important; color: var(--gold) !important; font-weight: bold; font-size: 14px; }
        .row-partida { background: #f8f8f8; font-weight: bold; color: #444; border-left: 4px solid var(--gold); }
        .col-edit { background: #fffde7; font-weight: bold; color: #000; }
        .col-resaltada { font-weight: bold; color: var(--accent); text-align: right; }
    </style>
</head>
<body>

<div class="header-fixed">
    <div>
        <strong>ARQ. DAVID LINDORO JUÁREZ</strong><br>
        <small>Consultoría Técnica: Gestión de Obra y Presupuesto de Autor</small>
    </div>
    <div class="summary-box">
        <div>Inversión Total Proyectada</div>
        <span id="total-global">$0.00</span>
    </div>
</div>

<div class="container">
    <div class="controls">
        <input type="file" id="upload-excel" accept=".xlsx, .csv" />
        <button class="btn-pdf" onclick="generarPDF()">Descargar Reporte PDF</button>
        <button class="btn-excel" onclick="exportarExcel()">Guardar Cambios Excel</button>
    </div>
    <div id="tabla-presupuesto"></div>
</div>

<script>
    let datosObra = [];

    document.getElementById('upload-excel').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            datosObra = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
            procesarYRenderizar();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function procesarYRenderizar() {
        if (datosObra.length === 0) return;

        let html = '<table id="main-table"><thead><tr>';
        const encabezados = ["Código", "Descripción", "Unidad", "Cant.", "Costo", "Importe"];
        encabezados.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';

        let acumuladoTotal = 0;

        for (let i = 7; i < datosObra.length; i++) {
            const fila = datosObra[i];
            const codigo = String(fila[0] || "");
            const desc = String(fila[1] || "");

            if (!desc && !codigo) continue;

            let claseFila = "";
            if (codigo.match(/^L\d{2}$/)) claseFila = "row-semana";
            else if (codigo.match(/^L\d{3}$/)) claseFila = "row-partida";

            html += `<tr class="${claseFila}">`;
            
            for (let j = 0; j < 6; j++) {
                let valor = fila[j] || "";
                let esEditable = (j === 3 || j === 4) && claseFila === "" ? `contenteditable="true" class="col-edit" onblur="actualizarDato(${i}, ${j}, this)"` : "";
                let claseCelda = j === 5 ? 'class="col-resaltada"' : "";
                
                let displayValue = valor;
                if ((j === 4 || j === 5) && !isNaN(parseFloat(valor)) && valor !== "") {
                    displayValue = parseFloat(valor).toLocaleString('es-MX', {minimumFractionDigits: 2});
                }

                html += `<td ${esEditable} ${claseCelda}>${displayValue}</td>`;
                
                if (j === 5 && claseFila === "" && !isNaN(parseFloat(valor))) {
                    acumuladoTotal += parseFloat(valor);
                }
            }
            html += '</tr>';
        }

        html += '</tbody></table>';
        document.getElementById('tabla-presupuesto').innerHTML = html;
        document.getElementById('total-global').innerText = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(acumuladoTotal);
    }

    function actualizarDato(fila, col, el) {
        let nuevoValor = parseFloat(el.innerText.replace(/[^0-9.-]+/g,"")) || 0;
        datosObra[fila][col] = nuevoValor;

        let cantidad = parseFloat(datosObra[fila][3]) || 0;
        let costo = parseFloat(datosObra[fila][4]) || 0;
        datosObra[fila][5] = (cantidad * costo).toFixed(2);

        procesarYRenderizar();
    }

    function generarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'letter');
        doc.text("PRESUPUESTO EJECUTIVO DE OBRA", 40, 40);
        doc.setFontSize(10);
        doc.text("Responsable: Arq. David Lindoro Juárez", 40, 55);
        doc.autoTable({ html: '#main-table', startY: 70, styles: { fontSize: 7 } });
        doc.save("Presupuesto_Consultoria_Lindoro.pdf");
    }

    function exportarExcel() {
        const ws = XLSX.utils.aoa_to_sheet(datosObra);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Obra");
        XLSX.writeFile(wb, "Control_Obra_Consultoria.xlsx");
    }
</script>
</body>
</html>
