<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consultoría Técnica | Arq. David Lindoro Juárez</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --dark: #1a1a1a; --gold: #c5a059; --accent: #27ae60; --pdf: #e74c3c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .nav { background: var(--dark); color: white; padding: 15px 30px; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .summary span { font-size: 24px; color: var(--gold); font-weight: bold; }
        .container { padding: 25px; max-width: 1500px; margin: auto; }
        
        .card-controls { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        
        .filter-group { background: #eee; padding: 10px 15px; border-radius: 6px; display: flex; align-items: center; gap: 10px; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; }
        
        button { padding: 12px 18px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; color: white; }
        .btn-xls { background: var(--accent); }
        .btn-pdf { background: var(--pdf); }
        
        .table-wrapper { background: white; border-radius: 8px; overflow: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-height: 70vh; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #333; color: white; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; }
        td { border: 1px solid #eee; padding: 8px; outline: none; }
        .row-semana { background: #2c3e50 !important; color: var(--gold) !important; font-weight: bold; }
        .row-hidden { display: none; }
        .col-money { text-align: right; font-weight: bold; }
    </style>
</head>
<body>

<div class="nav">
    <div><strong>ARQ. DAVID LINDORO JUÁREZ</strong><br><small>Gestión de Obra: Filtro por Periodos 2026</small></div>
    <div class="summary">Total Vista Actual: <span id="total-global">$0.00</span></div>
</div>

<div class="container">
    <div class="card-controls">
        <input type="file" id="file-input" accept=".xlsx, .csv" style="flex-grow:1" />
        
        <div class="filter-group">
            <label>Filtrar por:</label>
            <select id="semana-filter" onchange="aplicarFiltro()">
                <option value="todas">Ver Todo el Proyecto</option>
            </select>
        </div>
