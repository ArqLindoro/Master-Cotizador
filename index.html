<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto Dinámico - Arq. David Lindoro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-input { border: none; width: 100%; background: transparent; }
        .table-input:focus { outline: 2px solid #3b82f6; background: white; }
        tr:nth-child(even) { background-color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-100 p-8 font-sans">

    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-lg overflow-hidden">
        <div class="bg-white border-b p-6 text-center">
            <h1 class="text-2xl font-bold tracking-widest uppercase">LISTADO DE INSUMOS POR PARTIDA</h1>
            <p class="text-sm text-gray-500 mt-2">Ciudad de Puebla - Actualización Marzo 2026</p>
        </div>

        <div class="p-4 overflow-x-auto">
            <table class="w-full border-collapse border border-gray-300 text-sm">
                <thead>
                    <tr class="bg-gray-50 uppercase text-gray-700">
                        <th class="border border-gray-300 p-2 w-32">Código</th>
                        <th class="border border-gray-300 p-2">Descripción</th>
                        <th class="border border-gray-300 p-2 w-20">Unidad</th>
                        <th class="border border-gray-300 p-2 w-24">Cantidad</th>
                        <th class="border border-gray-300 p-2 w-32">Costo (MXN)</th>
                        <th class="border border-gray-300 p-2 w-32">Importe</th>
                    </tr>
                </thead>
                <tbody id="budget-body">
                    <tr class="bg-gray-100 font-bold"><td class="p-2 border">L</td><td colspan="5" class="p-2 border">Unifamiliar Roof Garden</td></tr>
                    <tr class="bg-gray-50 font-semibold"><td class="p-2 border">L01</td><td colspan="5" class="p-2 border italic">Semana 1</td></tr>
                    <tr class="bg-gray-50 font-semibold"><td class="p-2 border">L011</td><td colspan="5" class="p-2 border">Cisterna</td></tr>
                    
                    </tbody>
                <tfoot>
                    <tr class="bg-gray-200 font-bold">
                        <td class="border p-2">L011</td>
                        <td colspan="4" class="border p-2 text-right uppercase">TOTAL Cisterna</td>
                        <td id="grand-total" class="border p-2 text-blue-800 text-lg">$ 0.00</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="p-6 bg-gray-50 flex gap-4">
            <button onclick="addRow()" class="bg-black text-white px-6 py-2 rounded shadow hover:bg-gray-800 transition">
                + Agregar Material
            </button>
            <button onclick="window.print()" class="bg-gray-200 text-gray-700 px-6 py-2 rounded shadow hover:bg-gray-300 transition">
                Imprimir / PDF
            </button>
        </div>
    </div>

    <script>
        // Catálogo de precios 2026 Puebla
        const catalog = {
            "MA-ACER-0001": { desc: "ARMEX 10X10-4 DE 6.00 M", unit: "PZA", price: 155.00 },
            "MA-ACER-0008": { desc: "MALLA ELECTROSOLDADA 6X6/6-6 ROLLO 100M", unit: "ROLLO", price: 4650.00 },
            "MA-ACER-0010": { desc: "ALAMBRE RECOCIDO CAL.16 (1.59MM)", unit: "KG", price: 34.00 },
            "MA-ACER-0011": { desc: "CLAVO DE 2 1/2\"", unit: "KG", price: 55.00 },
            "MA-ACER-0002": { desc: "ARMEX 12X20-4 DE 6.00 M", unit: "PZA", price: 172.00 },
            "MA-AGLU-0001": { desc: "CALHIDRA SACO DE 25 KG", unit: "TON", price: 3850.00 },
            "MA-AGLU-0002": { desc: "CEMENTO (GRIS)", unit: "TON", price: 4950.00 },
            "MA-LOPF-0002": { desc: "BOVEDILLA DE 60X25X16 CM", unit: "PZA", price: 26.00 },
            "MA-LOPF-0016": { desc: "VIGUETA PRETENZADA PERALTE 11 1.35M", unit: "PZA", price: 245.00 },
            "MA-MURO-0005": { desc: "TABIQUE RECOCIDO ROJO 24X.06X12CM", unit: "PZA", price: 3.10 }
        };

        function addRow(code = "", qty = 0) {
            const tbody = document.getElementById('budget-body');
            const row = document.createElement('tr');
            
            row.innerHTML = `
                <td class="border p-1"><input type="text" value="${code}" class="table-input p-1 uppercase" onchange="updateRow(this)" placeholder="Código"></td>
                <td class="border p-1 text-gray-600"><input type="text" class="table-input p-1" readonly></td>
                <td class="border p-1 text-center text-gray-600"><input type="text" class="table-input text-center" readonly></td>
                <td class="border p-1"><input type="number" value="${qty}" class="table-input p-1 text-center font-bold" oninput="calculateTotal()"></td>
                <td class="border p-1"><input type="number" class="table-input p-1 text-right" oninput="calculateTotal()"></td>
                <td class="border p-1 text-right font-semibold text-gray-800 bg-gray-50">$ 0.00</td>
            `;
            tbody.appendChild(row);
            if(code) updateRow(row.querySelector('input'));
        }

        function updateRow(input) {
            const row = input.closest('tr');
            const data = catalog[input.value.toUpperCase()];
            if(data) {
                row.cells[1].querySelector('input').value = data.desc;
                row.cells[2].querySelector('input').value = data.unit;
                row.cells[4].querySelector('input').value = data.price;
            }
            calculateTotal();
        }

        function calculateTotal() {
            let grandTotal = 0;
            const rows = document.querySelectorAll('#budget-body tr:not(.bg-gray-100):not(.bg-gray-50)');
            
            rows.forEach(row => {
                const qty = parseFloat(row.cells[3].querySelector('input').value) || 0;
                const cost = parseFloat(row.cells[4].querySelector('input').value) || 0;
                const total = qty * cost;
                row.cells[5].innerText = '$ ' + total.toLocaleString('es-MX', {minimumFractionDigits: 2});
                grandTotal += total;
            });
            
            document.getElementById('grand-total').innerText = '$ ' + grandTotal.toLocaleString('es-MX', {minimumFractionDigits: 2});
        }

        // Carga inicial con tus datos de la imagen
        window.onload = () => {
            const initialData = [
                {c: "MA-ACER-0001", q: 6}, {c: "MA-ACER-0008", q: 0.34},
                {c: "MA-ACER-0010", q: 20}, {c: "MA-ACER-0011", q: 2},
                {c: "MA-ACER-0002", q: 4}, {c: "MA-AGLU-0001", q: 0.30},
                {c: "MA-AGLU-0002", q: 2}, {c: "MA-LOPF-0002", q: 44},
                {c: "MA-LOPF-0016", q: 8}, {c: "MA-MURO-0005", q: 1375}
            ];
            initialData.forEach(item => addRow(item.c, item.q));
        };
    </script>
</body>
</html>
