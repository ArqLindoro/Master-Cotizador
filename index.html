<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Insumos Nativo | Arq. David Lindoro</title>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --excel-border: #d4d4d4; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #444; margin: 0; }
        
        /* Panel de Control Estilo Dashboard */
        .dashboard { background: var(--dark); color: white; padding: 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--gold); }
        .dashboard h1 { margin: 0 0 15px 0; font-size: 18px; letter-spacing: 2px; text-align: center; font-weight: 300; }
        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; max-width: 1300px; margin: auto; }
        .control-grid div label { display: block; font-size: 9px; color: var(--gold); text-transform: uppercase; margin-bottom: 4px; }
        .control-grid input { width: 90%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 6px; font-size: 13px; border-radius: 3px; outline: none; }
        .control-grid input:focus { border-color: var(--gold); }

        /* Contenedor del Excel */
        .excel-sheet { background: white; width: 98%; max-width: 1500px; margin: 20px auto; overflow-x: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        
        /* Encabezados de Partida (Semanas) */
        .row-header { background: #f2f2f2; font-weight: bold; color: #333; text-transform: uppercase; font-size: 13px; }
        .row-header td { padding: 12px; border: 1px solid var(--excel-border); border-left: 6px solid var(--gold); }

        /* Encabezados de Columnas */
        thead th { background: #e1e1e1; color: #555; font-weight: normal; border: 1px solid var(--excel-border); padding: 5px; font-size: 11px; position: sticky; top: 125px; z-index: 900; }
        
        /* Estilo de Celdas */
        tbody td { border: 1px solid var(--excel-border); padding: 6px 10px; color: #444; }
        .col-id { background: #f9f9f9; font-family: 'Consolas', monospace; width: 100px; text-align: center; }
        .col-desc { width: 450px; }
        .col-unit { width: 60px; text-align: center; }
        .col-qty { width: 80px; text-align: center; font-weight: bold; }
        .col-price { width: 110px; text-align: right; background: #fff; }
        .col-total { width: 130px; text-align: right; background: #fffdf0; font-weight: bold; color: #000; }

        /* Footer de Totales */
        .footer-total { background: #111; color: white; padding: 30px; text-align: right; border-top: 5px solid var(--gold); }
        .total-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .total-value { font-size: 40px; color: var(--gold); font-weight: bold; margin-top: 5px; }
        
        .btn-wa { background: #25d366; color: white; padding: 15px 30px; border: none; text-decoration: none; display: inline-block; margin-top: 20px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

        <div><label>Cocina Tipo B</label><input type="number" id="val-cocina" value="31450" oninput="recalculaTodo()"></div>
    </div>
