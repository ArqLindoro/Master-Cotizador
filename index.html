<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Presupuesto Cuádruplex | Arq. David Lindoro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --dark: #1a1a1a; --gold: #c5a059; --accent: #27ae60; }
        body { font-family: 'Helvetica', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .header { background: var(--dark); color: white; padding: 20px; border-bottom: 4px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .total-box { text-align: right; }
        .total-box span { font-size: 24px; color: var(--gold); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; font-size: 12px; }
        th { background: #333; color: white; padding: 10px; text-align: left; }
        td { border: 1px solid #ddd; padding: 8px; }
        .row-semana { background: #333 !important; color: var(--gold) !important; font-weight: bold; }
        .row-partida { background: #f9f9f9; font-weight: bold; border-left: 4px solid var(--gold); }
        .col-edit { background: #fffde7; font-weight: bold; cursor: cell; }
        .col-resaltada { font-weight: bold; color: var(--accent); text-align: right; }
    </style>
</head>
<body>

<div class="header">
    <div><strong>CASA NUBIA - INDIVIDUAL (1/4)</strong><br>Arq. David Lindoro Juárez</div>
    <div class="total-box">Total Presupuesto: <br><span id="total-global">$0.00</span></div>
</div>

<div style="margin: 20px 0;">
    <input type="file" id="upload-excel" accept=".xlsx, .csv" />
    <p><small>* Cantidades divididas entre 4 automáticamente para esquema Cuádruplex.</small></p>
</div>

<div id="tabla-presupuesto"></div>

<script>
    let datosObra = [];
    let yaDividido = false;

    document.getElementById('upload-excel').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            datosObra = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
            yaDividido = false; // Resetear bandera para nuevo archivo
            procesarYRenderizar();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function procesarYRenderizar() {
        if (datosObra.length === 0) return;

        // 1. DIVISIÓN ÚNICA (Solo ocurre una vez al cargar el archivo)
        if (!yaDividido) {
            for (let i = 0; i < datosObra.length; i++) {
                const codigo = String(datosObra[i][0] || "");
                // Detectamos que es un insumo y no un encabezado (L01, L11, etc)
                if (i >= 7 && !codigo.match(/^L\d{1,3}$/) && datosObra[i][1] !== "") {
                    let cantOriginal = parseFloat(datosObra[i][3]) || 0;
                    let costo = parseFloat(datosObra[i][4]) || 0;
                    
                    if (cantOriginal > 0) {
                        datosObra[i][3] = (cantOriginal / 4).toFixed(4); // Cantidad Individual
                        datosObra[i][5] = (datosObra[i][3] * costo).toFixed(2); // Importe Individual
                    }
                }
            }
            yaDividido = true;
        }

        // 2. CONSTRUCCIÓN DE LA TABLA
        let html = '<table><thead><tr>';
        const encabezados = ["Código", "Descripción", "Unidad", "Cant. Individual", "Costo Unit. (E)", "Importe (F)"];
        encabezados.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';

        let acumuladoTotal = 0;

        for (let i = 7; i < datosObra.length; i++) {
            const fila = datosObra[i];
            const codigo = String(fila[0] || "");
            if (!fila[1] && !codigo) continue;

            let claseFila = "";
            if (codigo.match(/^L\d{2}$/)) claseFila = "row-semana";
            else if (codigo.match(/^L\d{3}$/)) claseFila = "row-partida";

            html += `<tr class="${claseFila}">`;
            
            for (let j = 0; j < 6; j++) {
                let valor = fila[j] || "";
                let esEditable = (j === 3 || j === 4) && claseFila === "" ? `contenteditable="true" class="col-edit" onblur="actualizarDato(${i}, ${j}, this)"` : "";
                let claseCelda = j === 5 ? 'class="col-resaltada"' : "";
                
                // Formatear números para visualización
                let displayValue = valor;
                if ((j === 4 || j === 5) && !isNaN(parseFloat(valor)) && valor !== "") {
                    displayValue = parseFloat(valor).toLocaleString('es-MX', {minimumFractionDigits: 2});
                }

                html += `<td ${esEditable} ${claseCelda}>${displayValue}</td>`;
                
                if (j === 5 && claseFila === "" && !isNaN(parseFloat(valor))) {
                    acumuladoTotal += parseFloat(valor);
                }
            }
            html += '</tr>';
        }

        html += '</tbody></table>';
        document.getElementById('tabla-presupuesto').innerHTML = html;
        document.getElementById('total-global').innerText = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(acumuladoTotal);
    }

    function actualizarDato(fila, col, el) {
        // Limpiar formato de moneda antes de guardar
        let valorLimpio = parseFloat(el.innerText.replace(/[^0-9.-]+/g,"")) || 0;
        datosObra[fila][col] = valorLimpio;

        // Recalcular Importe (F = D * E)
        let cant = parseFloat(datosObra[fila][3]) || 0;
        let costo = parseFloat(datosObra[fila][4]) || 0;
        datosObra[fila][5] = (cant * costo).toFixed(2);

        // Re-renderizar para actualizar el total global y formatos
        procesarYRenderizar();
    }
</script>

</body>
</html>
